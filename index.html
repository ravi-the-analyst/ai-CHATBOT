<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company AI Chatbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="bgCanvas"></canvas>

  <!-- Theme Toggle -->
  <button id="themeToggle" onclick="toggleTheme()">
    <span id="themeIcon">🌙</span>
  </button>

  <!-- Mode Buttons -->
  <div class="mode-toggle">
    <button id="websiteModeBtn" class="mode-btn active" onclick="switchMode('website')">🌐 Website Mode</button>
    <button id="fileModeBtn" class="mode-btn" onclick="switchMode('file')">📄 File Mode</button>
  </div>

  <div class="wrapper">
    <!-- Website Mode -->
    <div id="websiteMode">
      <div class="card">
        <h3>📌 Step 1: Load Website</h3>
        <div class="url-row">
          <input type="text" id="urlInput" placeholder="https://example.com">
          <button id="scrapeBtn" onclick="scrapeWebsite()">🔍 Load Website</button>
        </div>
        <div id="scrapeStatus" class="status"></div>
      </div>
    </div>

    <!-- File Mode - MATCHES websiteMode layout exactly -->
    <div id="fileMode" style="display:none;">
      <div class="card">
        <h3>📌 Step 1: Upload PDF / File</h3>
        <div class="url-row">
          <div class="file-display" id="fileDisplay" onclick="document.getElementById('fileInput').click()">
            📄 Choose a PDF, TXT, or DOCX file...
          </div>
          <button id="uploadBtn" onclick="document.getElementById('fileInput').click()">
            📤 Upload File
          </button>
          <input type="file" id="fileInput" accept=".pdf,.txt,.docx" 
                 style="display:none" onchange="uploadFile()" />
        </div>
        <div id="fileStatus" class="status"></div>
      </div>
    </div>

    <!-- Chat Section -->
    <div class="card">
      <h3>💬 Step 2: Chat with AI</h3>
      <div id="chatbox">
        <div class="message bot">
          👋 Hi! Load a website or file first, then ask me anything about it!
        </div>
      </div>
      <div class="chat-input-row">
        <input type="text" id="userInput" placeholder="Ask something..." onkeypress="handleKey(event)">
        <button onclick="sendMessage()">➤ Send</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script src="bg.js"></script>
